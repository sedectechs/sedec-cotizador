<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SEDEC">
<meta name="theme-color" content="#0d1f2e">
<title>SEDEC TECNOLOGÍAS — Cotizador Pro v7.3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* --- TUS ESTILOS ORIGINALES MANTENIDOS --- */
:root {
  --primary: #0d1f2e;
  --accent: #2ecc71;
  --error: #e74c3c;
  --bg: #f4f7f9;
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: var(--bg);
  color: #333;
  overflow-x: hidden;
}

/* --- FIX CRÍTICO IPHONE: LÍNEA AZUL Y TOQUE (v7.3) --- */
* { 
  -webkit-tap-highlight-color: transparent !important; 
  -webkit-touch-callout: none !important;
}

@media (max-width: 768px) {
  /* Forzamos que la lista MÓVIL real sea la que reciba el toque */
  #mResultsList div, .msh-item {
    padding: 22px 15px !important;
    min-height: 72px !important;
    background: #ffffff !important;
    border-bottom: 1px solid #eee !important;
    display: flex !important;
    align-items: center !important;
    cursor: pointer !important;
    pointer-events: auto !important;
    touch-action: manipulation !important;
    position: relative !important;
    z-index: 10000 !important; /* Prioridad sobre capas fantasma */
    font-size: 15px !important;
    color: var(--primary) !important;
  }
}

/* Estilo de la barra de carga (Línea azul de progreso) */
#loading-bar {
  position: fixed; top: 0; left: 0; width: 100%; height: 3px;
  background: #3498db; z-index: 99999; display: none;
}
#loading-bar.active { display: block; animation: loading 2s infinite; }
@keyframes loading { 0% { left: -100%; } 100% { left: 100%; } }

/* ... (Aquí continúan el resto de tus estilos originales de tablas, botones y modales) ... */
</style>

<script>
/* --- CONFIGURACIÓN Y ESTADO --- */
var _isUploading = false;
var _mshProduct = null;
var imgCache = JSON.parse(localStorage.getItem('sedec_imgs') || '{}');

function showLoading(active) {
  const bar = document.getElementById('loading-bar');
  if (bar) active ? bar.classList.add('active') : bar.classList.remove('active');
}

function saveImgs() { localStorage.setItem('sedec_imgs', JSON.stringify(imgCache)); }

/* --- FUNCIONES DE IMAGEN CORREGIDAS PARA IPHONE 15 PRO MAX --- */
async function _mshSyncImgs(productRef) {
  if(!productRef) return;
  showLoading(true);
  try {
    var fileName = 'productos/' + productRef.replace(/[^a-zA-Z0-9_-]/g,'_') + '.jpg';
    var imgURL = window._fbGetURL(fileName) + '&t=' + Date.now();
    
    var testResp = await fetch(imgURL, {method:'HEAD', mode:'cors'});
    if (testResp.ok) {
      imgCache[productRef] = window._fbGetURL(fileName);
      saveImgs();
      var mshImg = document.getElementById('msh-img');
      if (mshImg) { mshImg.src = imgURL; mshImg.style.display = 'block'; }
    }
  } catch(e) {
    console.error('Sync error:', e.message);
  } finally {
    showLoading(false); // <--- SIEMPRE SE APAGA
  }
}

function _mshHandleImg(event) {
  var file = event.target.files[0];
  var prod = _mshProduct || window._mshProduct;
  if (!file || !prod) { alert('Selecciona un producto primero'); return; }

  _isUploading = true;
  showLoading(true);

  var fileName = 'productos/' + prod.ref.replace(/[^a-zA-Z0-9_-]/g,'_') + '.jpg';

  // Subida directa mediante función autoejecutable para blindar Safari
  (async function() {
    try {
      if(window._fbUpload) {
        await window._fbUpload(fileName, file, file.type || 'image/jpeg');
        var url = window._fbGetURL(fileName);
        imgCache[prod.ref] = url;
        saveImgs();
        
        var mshImg = document.getElementById('msh-img');
        if (mshImg) {
          mshImg.src = url + '&t=' + Date.now();
          mshImg.style.display = 'block';
        }
        toast('✅ Imagen sincronizada', 'ok');
      }
    } catch(err) {
      alert("Error en iPhone: " + err.message);
    } finally {
      _isUploading = false;
      showLoading(false); // <--- APAGA LA LÍNEA AZUL PASE LO QUE PASE
    }
  })();
}

/* --- RENDERIZADO DE RESULTADOS MÓVIL (FIX SELECCIÓN) --- */
function renderMobileResults(results) {
  var container = document.getElementById('mResultsList');
  if (!container) return;
  container.innerHTML = '';
  
  results.forEach(function(p) {
    var div = document.createElement('div');
    div.className = 'msh-item';
    div.setAttribute('role', 'button'); // Para que iOS lo reconozca como clicable
    div.style.cursor = 'pointer';
    div.innerHTML = '<strong>' + p.ref + '</strong> - ' + p.desc;
    
    div.onclick = function() {
      _mshProduct = p;
      window._mshProduct = p;
      // Llamada a tu función original de selección
      if(typeof selectProduct === 'function') selectProduct(p);
      // Cerrar modal de búsqueda si es necesario
      var modal = document.getElementById('mobileSearchModal');
      if(modal) modal.style.display = 'none';
    };
    
    container.appendChild(div);
  });
}

/* ... (Aquí sigue TODO tu código original de Firebase, PDFs, cálculos, etc.) ... */
</script>
</head>
<body>
  <div id="loading-bar"></div>
  </body>
</html>
